<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Maklertagebuch" />
  <meta name="theme-color" content="#B8924A" />
  <title>Maklertagebuch</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #F7F5F0; font-family: 'Source Sans 3', Georgia, sans-serif; color: #2C2416; -webkit-text-size-adjust: 100%; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #D4B870; border-radius: 2px; }

    #app { height: 100dvh; display: flex; flex-direction: column; max-width: 680px; margin: 0 auto; position: relative; }

    /* ── HEADER ── */
    .header { background: #fff; border-bottom: 1px solid #E8E4DA; padding: 16px 20px 14px; flex-shrink: 0; box-shadow: 0 1px 4px rgba(44,36,22,0.06); }
    .header-top { display: flex; align-items: center; justify-content: space-between; }
    .header-brand { font-size: 10px; color: #B8924A; letter-spacing: 2px; text-transform: uppercase; font-weight: 600; }
    .header-title { font-family: 'Playfair Display', serif; font-size: 22px; color: #2C2416; margin-top: 2px; }
    .header-sub { font-size: 12px; color: #B0A080; margin-top: 2px; }

    /* ── SCROLL AREA ── */
    .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 90px; }

    /* ── BOTTOM NAV ── */
    .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 680px; background: rgba(255,253,248,0.97); border-top: 1px solid #E8E4DA; display: flex; padding: 8px 0; padding-bottom: max(8px, env(safe-area-inset-bottom)); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); z-index: 100; box-shadow: 0 -2px 16px rgba(44,36,22,0.06); }
    .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 6px 4px; border: none; background: transparent; color: #B0A080; font-size: 11px; -webkit-tap-highlight-color: transparent; transition: color 0.15s; }
    .nav-btn.active { color: #B8924A; font-weight: 600; }
    .nav-icon { font-size: 22px; line-height: 1; }

    /* ── CARDS ── */
    .card { background: #fff; border: 1px solid #E8E4DA; border-radius: 16px; padding: 18px; box-shadow: 0 1px 3px rgba(44,36,22,0.07), 0 4px 12px rgba(44,36,22,0.05); }
    .card + .card, .pk + .pk { margin-top: 12px; }
    .pk { background: #fff; border: 1px solid #E8E4DA; border-radius: 16px; padding: 18px; box-shadow: 0 1px 3px rgba(44,36,22,0.07); }

    /* ── BUTTONS ── */
    .btn { display: block; width: 100%; padding: 14px 20px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; text-align: center; -webkit-tap-highlight-color: transparent; transition: all 0.15s; font-family: 'Source Sans 3', sans-serif; }
    .btn:active { transform: scale(0.98); }
    .btn-gold { background: #B8924A; color: #fff; box-shadow: 0 2px 8px rgba(184,146,74,0.35); }
    .btn-gold:active { background: #9A7A3A; }
    .btn-gold:disabled { background: #D8D0C0; color: #A0988A; box-shadow: none; cursor: not-allowed; transform: none; }
    .btn-outline { background: #fff; color: #B8924A; border: 1.5px solid #B8924A; }
    .btn-outline:active { background: #F5EDD8; }
    .btn-ghost { background: #F7F5F0; color: #7A6A4A; border: 1.5px solid #E8E4DA; padding: 11px 16px; border-radius: 10px; font-size: 14px; cursor: pointer; font-family: 'Source Sans 3', sans-serif; -webkit-tap-highlight-color: transparent; }
    .btn-ghost:active { background: #F0EBE0; }
    .btn-danger { background: #FFF5F5; color: #9A4A4A; border: 1px solid rgba(154,74,74,0.25); padding: 8px 14px; border-radius: 10px; font-size: 13px; cursor: pointer; font-family: 'Source Sans 3', sans-serif; -webkit-tap-highlight-color: transparent; }

    /* ── FORMS ── */
    input, textarea, select { background: #FAFAF7; border: 1.5px solid #E8E4DA; color: #2C2416; border-radius: 12px; padding: 13px 16px; font-size: 16px; width: 100%; outline: none; font-family: 'Source Sans 3', sans-serif; -webkit-appearance: none; appearance: none; transition: border-color 0.15s, box-shadow 0.15s; }
    input:focus, textarea:focus, select:focus { border-color: #B8924A; box-shadow: 0 0 0 3px rgba(184,146,74,0.12); }
    textarea { resize: none; line-height: 1.7; }
    input::placeholder, textarea::placeholder { color: #C0B090; }

    /* ── LABELS ── */
    .step-label { font-size: 11px; color: #B8924A; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; display: block; }
    .field-label { font-size: 13px; color: #7A6A4A; margin-bottom: 6px; }
    .section-sub { font-size: 12px; color: #B0A080; }
    .divider { height: 1px; background: #E8E4DA; margin: 18px 0; }

    /* ── TAG ── */
    .tag { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500; border: 1px solid; }
    .tag-aktiv { background: rgba(74,138,90,0.1); color: #4A8A5A; border-color: rgba(74,138,90,0.25); }
    .tag-verkauft { background: #F5EDD8; color: #9A7A3A; border-color: #D4B870; }
    .tag-reserviert { background: rgba(74,106,154,0.1); color: #4A6A9A; border-color: rgba(74,106,154,0.3); }
    .tag-archiviert { background: #F0EEE8; color: #8A8070; border-color: #D0CCC0; }

    /* ── ALERTS ── */
    .alert-error { background: #FFF5F5; border: 1px solid rgba(154,74,74,0.3); border-radius: 12px; padding: 14px 16px; color: #9A4A4A; font-size: 13px; margin-top: 12px; line-height: 1.6; }
    .alert-success { background: #F0FBF3; border: 1px solid rgba(74,138,90,0.25); border-radius: 12px; padding: 16px; margin-top: 14px; }
    .alert-success-label { font-size: 11px; color: #4A8A5A; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }

    /* ── TOAST ── */
    #toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%) translateY(-80px); z-index: 9999; padding: 12px 20px; border-radius: 12px; font-size: 14px; font-weight: 500; white-space: nowrap; box-shadow: 0 4px 20px rgba(44,36,22,0.15); transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1); pointer-events: none; }
    #toast.show { transform: translateX(-50%) translateY(0); }
    #toast.success { background: #F0FBF3; border: 1px solid rgba(74,138,90,0.3); color: #4A8A5A; }
    #toast.error { background: #FFF5F5; border: 1px solid rgba(154,74,74,0.3); color: #9A4A4A; }
    #toast.info { background: #F0F4FB; border: 1px solid rgba(74,106,154,0.3); color: #4A6A9A; }

    /* ── MIC ── */
    .mic-active { background: #FFF0F0; color: #C04040; border: 1.5px solid rgba(192,64,64,0.3); animation: recpulse 1.4s ease-in-out infinite; }
    @keyframes recpulse { 0%,100%{box-shadow:0 0 0 0 rgba(192,64,64,0.2)} 50%{box-shadow:0 0 0 8px rgba(192,64,64,0)} }
    .mic-hint { font-size: 12px; color: #C04040; text-align: center; margin-top: 8px; }

    /* ── STAT ── */
    .stat-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .stat-card { background: #fff; border: 1px solid #E8E4DA; border-radius: 14px; padding: 16px 10px; text-align: center; box-shadow: 0 1px 3px rgba(44,36,22,0.06); }
    .stat-val { font-family: 'Playfair Display', serif; font-size: 30px; line-height: 1; }
    .stat-label { font-size: 9px; color: #B0A080; letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
    .stat-sub { font-size: 11px; color: #B0A080; margin-top: 4px; }

    /* ── PTEXT ── */
    .ptext { font-size: 14px; line-height: 1.85; color: #7A6A4A; white-space: pre-wrap; }

    /* ── UTIL ── */
    .row { display: flex; gap: 10px; }
    .row > * { flex: 1; }
    .mt8 { margin-top: 8px; }
    .mt12 { margin-top: 12px; }
    .mt16 { margin-top: 16px; }
    .mt20 { margin-top: 20px; }
    .hidden { display: none !important; }
    .p16 { padding: 16px; }
    .pb8 { padding-bottom: 8px; }
    details summary { cursor: pointer; font-size: 12px; color: #B0A080; }
    details > div { margin-top: 8px; font-size: 13px; color: #7A6A4A; line-height: 1.65; padding: 10px 12px; background: #F7F5F0; border-radius: 8px; border: 1px solid #E8E4DA; }
    .back-btn { background: #F5EDD8; border: none; color: #B8924A; font-size: 20px; cursor: pointer; padding: 6px 10px; border-radius: 8px; -webkit-tap-highlight-color: transparent; }
  </style>
</head>
<body>
<div id="app">
  <div id="toast"></div>

  <!-- HEADER -->
  <div class="header" id="header">
    <div class="header-brand">Makler Tagebuch</div>
    <div class="header-title" id="header-title">Guten Tag</div>
    <div class="header-sub" id="header-sub"></div>
  </div>

  <!-- SCROLL AREA -->
  <div class="scroll-area" id="scroll-area">

    <!-- DASHBOARD -->
    <div id="view-dashboard" class="p16">
      <div class="stat-grid mt8">
        <div class="stat-card">
          <div class="stat-label">Objekte</div>
          <div class="stat-val" id="stat-objekte" style="color:#4A8A5A">0</div>
          <div class="stat-sub" id="stat-objekte-sub"></div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Protokolle</div>
          <div class="stat-val" id="stat-protokolle" style="color:#B8924A">0</div>
          <div class="stat-sub">gesamt</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Heute</div>
          <div class="stat-val" id="stat-heute" style="color:#4A6A9A">0</div>
          <div class="stat-sub">neu</div>
        </div>
      </div>
      <div class="mt16" style="display:flex;flex-direction:column;gap:10px">
        <button class="btn btn-gold" onclick="showView('neu')">＋  Neues Protokoll erstellen</button>
        <button class="btn btn-outline" onclick="showView('objekte');showObjektForm()">＋  Objekt anlegen</button>
      </div>
      <div class="divider"></div>
      <div style="font-size:11px;color:#B0A080;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:12px">Zuletzt erstellt</div>
      <div id="dashboard-recent"></div>
    </div>

    <!-- NEUES PROTOKOLL -->
    <div id="view-neu" class="hidden p16">
      <span class="step-label">① Notizen eingeben</span>
      <textarea id="notiz-input" rows="5" placeholder="Gesprächsnotizen... z.B.: Herr Müller angerufen. Kaufinteresse bestätigt. Besichtigung Samstag 10 Uhr. Budget 450.000 €."></textarea>
      <div class="row mt8">
        <button class="btn-ghost" id="mic-btn" onclick="toggleMic()">🎙 Spracheingabe</button>
        <button class="btn-danger" id="clear-btn" onclick="clearNotiz()" style="display:none">✕ Leeren</button>
      </div>
      <div class="mic-hint hidden" id="mic-hint">🔴 Sprechen Sie jetzt… Deutsch wird erkannt</div>

      <div class="divider"></div>
      <span class="step-label">② KI-Protokoll erzeugen</span>
      <button class="btn btn-gold" id="gen-btn" onclick="generateProtokoll()">✦  Protokoll erstellen</button>
      <div class="alert-error hidden" id="gen-error"></div>
      <div class="alert-success hidden" id="gen-result">
        <div class="alert-success-label">✓ Protokoll erstellt</div>
        <div class="ptext" id="gen-text"></div>
        <div class="divider"></div>
        <div class="field-label">Bearbeiten:</div>
        <textarea id="gen-edit" rows="4" style="font-size:14px"></textarea>
      </div>

      <div class="divider"></div>
      <span class="step-label">③ Objekt zuordnen (optional)</span>
      <select id="objekt-select"><option value="">— Kein Objekt —</option></select>

      <div style="display:flex;flex-direction:column;gap:10px;margin-top:20px">
        <button class="btn btn-gold" id="save-btn" onclick="saveProtokoll()">Protokoll speichern</button>
        <button class="btn btn-outline" onclick="resetNeu()">Zurücksetzen</button>
      </div>
    </div>

    <!-- TAGEBUCH -->
    <div id="view-tagebuch" class="hidden">
      <div class="p16 pb8">
        <select id="filter-select" onchange="renderTagebuch()">
          <option value="alle">Alle Objekte</option>
          <option value="">Kein Objekt</option>
        </select>
      </div>
      <div class="p16" id="tagebuch-list"></div>
    </div>

    <!-- OBJEKTE -->
    <div id="view-objekte" class="hidden p16">
      <button class="btn btn-gold" id="objekt-form-toggle" onclick="toggleObjektForm()" style="margin-bottom:16px">＋  Objekt anlegen</button>
      <div class="card hidden" id="objekt-form" style="margin-bottom:16px">
        <div style="font-size:12px;color:#B8924A;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:14px">Neues Objekt</div>
        <div class="field-label">Adresse *</div>
        <input id="obj-adresse" placeholder="Straße Nr, PLZ Ort" style="margin-bottom:12px" />
        <div class="field-label">Kurzexposé</div>
        <input id="obj-expose" placeholder="z.B. 3 Zi., 85m², EG" style="margin-bottom:12px" />
        <div class="row" style="margin-bottom:14px">
          <div>
            <div class="field-label">Typ</div>
            <select id="obj-typ"><option>Wohnung</option><option>Haus</option><option>Gewerbe</option><option>Grundstück</option><option>MFH</option></select>
          </div>
          <div>
            <div class="field-label">Status</div>
            <select id="obj-status"><option>Aktiv</option><option>Reserviert</option><option>Verkauft</option><option>Archiviert</option></select>
          </div>
        </div>
        <button class="btn btn-gold" onclick="saveObjekt()">Speichern</button>
      </div>
      <div id="objekte-list"></div>
    </div>

    <!-- OBJEKT DETAIL -->
    <div id="view-objekt-detail" class="hidden p16">
      <div id="objekt-detail-content"></div>
    </div>

  </div><!-- end scroll-area -->

  <!-- BOTTOM NAV -->
  <nav class="nav-bar">
    <button class="nav-btn active" id="nav-dashboard" onclick="showView('dashboard')">
      <span class="nav-icon">⊞</span>Start
    </button>
    <button class="nav-btn" id="nav-neu" onclick="showView('neu')">
      <span class="nav-icon">✦</span>Neu
    </button>
    <button class="nav-btn" id="nav-tagebuch" onclick="showView('tagebuch')">
      <span class="nav-icon">≡</span>Tagebuch
    </button>
    <button class="nav-btn" id="nav-objekte" onclick="showView('objekte')">
      <span class="nav-icon">⌂</span>Objekte
    </button>
  </nav>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────
const KEY_OBJ = 'mt_obj_v6';
const KEY_PRO = 'mt_pro_v6';

function load(key, def) { try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : def; } catch { return def; } }
function save(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

let objekte = load(KEY_OBJ, [
  { id: '1', adresse: 'Musterstraße 12, München', typ: 'Wohnung', expose: '85m², 3 Zi., EG', status: 'Aktiv' },
  { id: '2', adresse: 'Berliner Allee 7, Düsseldorf', typ: 'Haus', expose: '180m², Garten', status: 'Aktiv' },
]);
let protokolle = load(KEY_PRO, []);
let currentView = 'dashboard';
let selectedObjektId = '';
let isListening = false;
let recognition = null;

// ── TOAST ──────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = type; }, 2800);
}

// ── VIEWS ──────────────────────────────────────────────────────
const views = ['dashboard', 'neu', 'tagebuch', 'objekte', 'objekt-detail'];
function showView(v) {
  currentView = v;
  views.forEach(id => {
    const el = document.getElementById('view-' + id);
    if (el) el.classList.toggle('hidden', id !== v);
  });
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  const navMap = { dashboard: 'nav-dashboard', neu: 'nav-neu', tagebuch: 'nav-tagebuch', objekte: 'nav-objekte', 'objekt-detail': 'nav-objekte' };
  const navEl = document.getElementById(navMap[v]);
  if (navEl) navEl.classList.add('active');

  const titles = { dashboard: 'Guten Tag', neu: 'Neues Protokoll', tagebuch: 'Tagebuch', objekte: 'Objekte', 'objekt-detail': 'Objekt' };
  const subs = { dashboard: new Date().toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' }), neu: 'Notiz → KI-Protokoll → Speichern', tagebuch: protokolle.length + ' Einträge', objekte: objekte.length + ' Verkaufsobjekte', 'objekt-detail': '' };
  document.getElementById('header-title').textContent = titles[v] || '';
  document.getElementById('header-sub').textContent = subs[v] || '';

  document.getElementById('scroll-area').scrollTop = 0;
  if (v === 'dashboard') renderDashboard();
  if (v === 'tagebuch') renderTagebuch();
  if (v === 'objekte') renderObjekte();
  if (v === 'neu') updateSaveBtn();
}

// ── HELPERS ────────────────────────────────────────────────────
function getObjektName(id) { return (objekte.find(o => o.id === id) || {}).adresse || 'Kein Objekt'; }
function todayStr() { return new Date().toLocaleDateString('de-DE'); }
function newId() { return Date.now().toString(); }
function tagClass(s) { return s === 'Aktiv' ? 'tag-aktiv' : s === 'Verkauft' ? 'tag-verkauft' : s === 'Reserviert' ? 'tag-reserviert' : 'tag-archiviert'; }

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── DASHBOARD ─────────────────────────────────────────────────
function renderDashboard() {
  const aktiv = objekte.filter(o => o.status === 'Aktiv').length;
  document.getElementById('stat-objekte').textContent = objekte.length;
  document.getElementById('stat-objekte-sub').textContent = aktiv + ' aktiv';
  document.getElementById('stat-protokolle').textContent = protokolle.length;
  document.getElementById('stat-heute').textContent = protokolle.filter(p => p.erstellt === todayStr()).length;

  const recent = protokolle.slice(0, 2);
  const el = document.getElementById('dashboard-recent');
  if (!recent.length) { el.innerHTML = '<div style="color:#B0A080;font-size:13px;text-align:center;padding:20px 0">Noch keine Protokolle vorhanden</div>'; return; }
  el.innerHTML = recent.map(p => `
    <div class="pk" style="cursor:pointer;margin-bottom:12px" onclick="showView('tagebuch')">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px">
        <div style="font-family:'Playfair Display',serif;font-size:14px;color:#2C2416;flex:1;padding-right:8px">${escHtml(getObjektName(p.objektId))}</div>
        <div style="font-size:11px;color:#B0A080;white-space:nowrap">${escHtml(p.erstellt)}</div>
      </div>
      <div class="ptext" style="font-size:13px;max-height:48px;overflow:hidden">${escHtml(p.protokoll.slice(0,130))}…</div>
    </div>`).join('');
}

// ── NEUES PROTOKOLL ────────────────────────────────────────────
document.getElementById('notiz-input').addEventListener('input', function() {
  document.getElementById('clear-btn').style.display = this.value ? 'block' : 'none';
  updateSaveBtn();
});

function clearNotiz() {
  document.getElementById('notiz-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  updateSaveBtn();
}

function updateSaveBtn() {
  const hasNotiz = document.getElementById('notiz-input').value.trim().length > 0;
  const hasGen = document.getElementById('gen-edit').value.trim().length > 0;
  document.getElementById('save-btn').disabled = !hasNotiz && !hasGen;
}

function resetNeu() {
  document.getElementById('notiz-input').value = '';
  document.getElementById('clear-btn').style.display = 'none';
  document.getElementById('gen-result').classList.add('hidden');
  document.getElementById('gen-error').classList.add('hidden');
  document.getElementById('gen-edit').value = '';
  document.getElementById('gen-text').textContent = '';
  document.getElementById('objekt-select').value = selectedObjektId || '';
  updateSaveBtn();
}

function updateObjektSelect() {
  const sel = document.getElementById('objekt-select');
  const cur = sel.value;
  sel.innerHTML = '<option value="">— Kein Objekt —</option>' + objekte.map(o => `<option value="${escHtml(o.id)}">${escHtml(o.adresse)}</option>`).join('');
  if (cur) sel.value = cur;
  if (selectedObjektId) sel.value = selectedObjektId;

  const filterSel = document.getElementById('filter-select');
  const filterCur = filterSel.value;
  filterSel.innerHTML = '<option value="alle">Alle Objekte</option><option value="">Kein Objekt</option>' + objekte.map(o => `<option value="${escHtml(o.id)}">${escHtml(o.adresse)}</option>`).join('');
  if (filterCur) filterSel.value = filterCur;
}

async function generateProtokoll() {
  const notiz = document.getElementById('notiz-input').value.trim();
  if (!notiz) return;
  const btn = document.getElementById('gen-btn');
  btn.textContent = '⟳  Generiere…';
  btn.disabled = true;
  document.getElementById('gen-result').classList.add('hidden');
  document.getElementById('gen-error').classList.add('hidden');

  const heute = new Date().toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const systemPrompt = `Du bist ein Assistent für Immobilienmakler. Erstelle aus den Notizen ein professionelles deutsches Gesprächsprotokoll.\n\nFormat:\nDatum: [Datum]\nTeilnehmer: [falls erkennbar]\n\nZusammenfassung:\n[2-3 Sätze]\n\nWichtige Punkte:\n• [Punkt]\n\nNächste Schritte:\n• [Schritt]\n\nNutze Immobilien-Fachsprache. Antworte nur mit dem Protokoll.`;

  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6-20251101',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: `Datum: ${heute}\n\nNotizen:\n${notiz}` }]
      })
    });
    const raw = await res.text();
    let data;
    try { data = JSON.parse(raw); } catch { throw new Error('Kein JSON: ' + raw.slice(0,100)); }
    if (data.error) throw new Error(data.error.type + ': ' + data.error.message);
    const text = (data.content || []).find(b => b.type === 'text')?.text;
    if (!text) throw new Error('Keine Antwort. HTTP ' + res.status);

    document.getElementById('gen-text').textContent = text;
    document.getElementById('gen-edit').value = text;
    document.getElementById('gen-result').classList.remove('hidden');
    document.getElementById('gen-edit').addEventListener('input', updateSaveBtn);
    updateSaveBtn();
  } catch(e) {
    const errEl = document.getElementById('gen-error');
    errEl.innerHTML = '<strong>Fehler beim Generieren</strong><br>' + escHtml(e.message);
    errEl.classList.remove('hidden');
  }

  btn.textContent = '✦  Protokoll erstellen';
  btn.disabled = false;
}

function saveProtokoll() {
  const notiz = document.getElementById('notiz-input').value.trim();
  const generated = document.getElementById('gen-edit').value.trim();
  const inhalt = generated || notiz;
  if (!inhalt) return;
  const objektId = document.getElementById('objekt-select').value;
  protokolle.unshift({ id: newId(), datum: new Date().toISOString(), objektId, rohnotiz: notiz, protokoll: inhalt, erstellt: todayStr() });
  save(KEY_PRO, protokolle);
  selectedObjektId = '';
  resetNeu();
  showView('tagebuch');
  toast('Protokoll gespeichert ✓');
}

// ── SPEECH ────────────────────────────────────────────────────
function toggleMic() { isListening ? stopListening() : startListening(); }
function startListening() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Spracheingabe nicht unterstützt', 'error'); return; }
  recognition = new SR();
  recognition.lang = 'de-DE';
  recognition.continuous = true;
  recognition.interimResults = true;
  let base = document.getElementById('notiz-input').value;
  if (base && !base.endsWith(' ')) base += ' ';
  recognition.onresult = e => {
    let final = base, interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) { final += e.results[i][0].transcript + ' '; base = final; }
      else interim += e.results[i][0].transcript;
    }
    document.getElementById('notiz-input').value = final + interim;
    document.getElementById('clear-btn').style.display = 'block';
    updateSaveBtn();
  };
  recognition.onerror = e => { if (e.error !== 'aborted') toast('Mikrofon-Fehler: ' + e.error, 'error'); stopListening(); };
  recognition.onend = () => { if (isListening) stopListening(); };
  recognition.start();
  isListening = true;
  const btn = document.getElementById('mic-btn');
  btn.textContent = '⏹ Aufnahme stoppen';
  btn.classList.add('mic-active');
  document.getElementById('mic-hint').classList.remove('hidden');
}
function stopListening() {
  if (recognition) { recognition.stop(); recognition = null; }
  isListening = false;
  const btn = document.getElementById('mic-btn');
  btn.textContent = '🎙 Spracheingabe';
  btn.classList.remove('mic-active');
  document.getElementById('mic-hint').classList.add('hidden');
}

// ── TAGEBUCH ──────────────────────────────────────────────────
function renderTagebuch() {
  document.getElementById('header-sub').textContent = protokolle.length + ' Einträge';
  const filter = document.getElementById('filter-select').value;
  const list = filter === 'alle' ? protokolle : protokolle.filter(p => p.objektId === filter);
  const el = document.getElementById('tagebuch-list');
  if (!list.length) {
    el.innerHTML = '<div class="card" style="text-align:center;padding:40px"><div style="font-family:\'Playfair Display\',serif;font-size:18px;color:#B0A080;margin-bottom:14px">Keine Einträge</div><button class="btn btn-gold" onclick="showView(\'neu\')">Erstes Protokoll erstellen</button></div>';
    return;
  }
  el.innerHTML = list.map(p => `
    <div class="pk" style="margin-bottom:12px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div style="flex:1;padding-right:10px">
          <div style="font-family:'Playfair Display',serif;font-size:14px;color:#2C2416;margin-bottom:2px">${escHtml(getObjektName(p.objektId))}</div>
          <div style="font-size:11px;color:#B0A080">${escHtml(p.erstellt)}</div>
        </div>
        <button class="btn-danger" onclick="deleteProtokoll('${escHtml(p.id)}')">Löschen</button>
      </div>
      <div class="divider" style="margin:10px 0"></div>
      <div class="ptext">${escHtml(p.protokoll)}</div>
      ${p.rohnotiz && p.rohnotiz !== p.protokoll ? `<details style="margin-top:12px"><summary>Originalnotiz anzeigen</summary><div>${escHtml(p.rohnotiz)}</div></details>` : ''}
    </div>`).join('');
}

function deleteProtokoll(id) {
  if (!confirm('Protokoll löschen?')) return;
  protokolle = protokolle.filter(p => p.id !== id);
  save(KEY_PRO, protokolle);
  renderTagebuch();
  toast('Gelöscht');
}

// ── OBJEKTE ───────────────────────────────────────────────────
function showObjektForm() { document.getElementById('objekt-form').classList.remove('hidden'); document.getElementById('objekt-form-toggle').textContent = 'Abbrechen'; }
function toggleObjektForm() {
  const form = document.getElementById('objekt-form');
  const hidden = form.classList.toggle('hidden');
  document.getElementById('objekt-form-toggle').textContent = hidden ? '＋  Objekt anlegen' : 'Abbrechen';
}

function saveObjekt() {
  const adresse = document.getElementById('obj-adresse').value.trim();
  if (!adresse) return;
  const obj = { id: newId(), adresse, expose: document.getElementById('obj-expose').value.trim(), typ: document.getElementById('obj-typ').value, status: document.getElementById('obj-status').value };
  objekte.unshift(obj);
  save(KEY_OBJ, objekte);
  document.getElementById('obj-adresse').value = '';
  document.getElementById('obj-expose').value = '';
  document.getElementById('objekt-form').classList.add('hidden');
  document.getElementById('objekt-form-toggle').textContent = '＋  Objekt anlegen';
  updateObjektSelect();
  renderObjekte();
  toast('Objekt angelegt ✓');
}

function renderObjekte() {
  document.getElementById('header-sub').textContent = objekte.length + ' Verkaufsobjekte';
  const el = document.getElementById('objekte-list');
  el.innerHTML = objekte.map(obj => {
    const n = protokolle.filter(p => p.objektId === obj.id).length;
    return `<div class="card" style="margin-bottom:12px;cursor:pointer" onclick="showObjektDetail('${escHtml(obj.id)}')">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <span class="tag ${tagClass(obj.status)}">${escHtml(obj.status)}</span>
        <span style="font-size:12px;color:#B0A080">${escHtml(obj.typ)}</span>
      </div>
      <div style="font-family:'Playfair Display',serif;font-size:17px;color:#2C2416;margin-bottom:4px">${escHtml(obj.adresse)}</div>
      ${obj.expose ? `<div style="font-size:13px;color:#7A6A4A;margin-bottom:10px">${escHtml(obj.expose)}</div>` : ''}
      <div class="divider" style="margin:10px 0"></div>
      <div style="font-size:13px;color:#B8924A;font-weight:500">${n} ${n === 1 ? 'Protokoll' : 'Protokolle'} →</div>
    </div>`;
  }).join('');
}

// ── OBJEKT DETAIL ─────────────────────────────────────────────
function showObjektDetail(id) {
  const obj = objekte.find(o => o.id === id);
  if (!obj) return;
  const protos = protokolle.filter(p => p.objektId === id);
  const sc = tagClass(obj.status);
  document.getElementById('header-title').textContent = obj.adresse;
  document.getElementById('header-sub').textContent = obj.typ + (obj.expose ? ' · ' + obj.expose : '');
  document.getElementById('objekt-detail-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
      <button class="back-btn" onclick="showView('objekte')">←</button>
      <span class="tag ${sc}">${escHtml(obj.status)}</span>
    </div>
    <button class="btn btn-gold" onclick="startProtokollForObjekt('${escHtml(id)}')" style="margin-bottom:20px">＋  Neues Protokoll für dieses Objekt</button>
    <div style="font-size:11px;color:#B0A080;letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-bottom:12px">Protokolle (${protos.length})</div>
    ${!protos.length ? '<div style="color:#B0A080;font-size:14px;padding:20px 0">Noch keine Protokolle.</div>' :
      protos.map(p => `<div class="pk" style="margin-bottom:12px"><div style="font-size:11px;color:#B0A080;margin-bottom:8px">${escHtml(p.erstellt)}</div><div class="ptext">${escHtml(p.protokoll)}</div></div>`).join('')}
  `;
  showView('objekt-detail');
}

function startProtokollForObjekt(id) {
  selectedObjektId = id;
  showView('neu');
  updateObjektSelect();
}

// ── INIT ──────────────────────────────────────────────────────
updateObjektSelect();
showView('dashboard');
</script>
</body>
